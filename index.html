<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Create and manage activity configurations for Dopple devices" />
    <link rel="apple-touch-icon" href="/dopple_logo.webp" />
    <title>Dopple Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // CLI auth: if we land on / after OAuth but the CLI flag is set, redirect to /cli-auth
      if (sessionStorage.getItem('dopple-cli-auth') && location.pathname === '/' && location.hash) {
        location.replace('/cli-auth');
      }
      // Capture CLI auth hash before Supabase JS client consumes it
      if (location.pathname === '/cli-auth' && location.hash) {
        sessionStorage.setItem('cli-auth-hash', location.hash.substring(1));
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
